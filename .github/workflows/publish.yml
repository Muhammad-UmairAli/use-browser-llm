name: Publish

# Publishes to both npmjs.com (canonical, primary distribution — install
# name `use-browser-llm`) and GitHub Packages (npm.pkg.github.com, scoped
# under the repo owner as `@Muhammad-UmairAli/use-browser-llm` — GitHub's
# npm registry requires the scope to match the owner). The two publish
# jobs are independent: one registry failing doesn't block the other.
#
# Runs automatically on every vX.Y.Z tag push — cut a release by tagging a
# commit on main (e.g. after merging a release/* branch under Git Flow)
# with `git tag vX.Y.Z && git push origin vX.Y.Z`. Requires an NPM_TOKEN
# repo secret with publish rights for use-browser-llm (Settings > Secrets
# and variables > Actions); the GitHub Packages job needs no separate
# secret, it uses the workflow's own built-in GITHUB_TOKEN with
# `packages: write` permission.
#
# Can also be dispatched manually (Actions tab, or `gh workflow run
# publish.yml --ref <branch>`) to publish the GitHub Packages copy of a
# version that's already live on npmjs.com, without re-tagging — used
# once to backfill v0.1.2, which predates this second registry. On a
# manual dispatch, publish-npm is skipped entirely (re-publishing an
# already-published npmjs.com version always fails) and the
# tag-vs-package.json-version guard is skipped in publish-github-packages
# too (there's no tag ref to check against on a manual run — the
# dispatcher is trusted to have the right commit checked out).

on:
  push:
    tags:
      - "v*"
  workflow_dispatch: {}

jobs:
  publish-npm:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # for npm provenance
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"
          registry-url: "https://registry.npmjs.org"
      - run: pnpm install --frozen-lockfile
      - name: Verify tag matches package.json version
        run: |
          PKG_VERSION="v$(node -p "require('./package.json').version")"
          TAG_NAME="${GITHUB_REF_NAME}"
          if [ "$PKG_VERSION" != "$TAG_NAME" ]; then
            echo "Tag $TAG_NAME does not match package.json version $PKG_VERSION"
            exit 1
          fi
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm build
      - run: pnpm publish --no-git-checks --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish-github-packages:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"
          registry-url: "https://npm.pkg.github.com"
          scope: "@${{ github.repository_owner }}"
      - run: pnpm install --frozen-lockfile
      - name: Verify tag matches package.json version
        if: github.event_name == 'push'
        run: |
          PKG_VERSION="v$(node -p "require('./package.json').version")"
          TAG_NAME="${GITHUB_REF_NAME}"
          if [ "$PKG_VERSION" != "$TAG_NAME" ]; then
            echo "Tag $TAG_NAME does not match package.json version $PKG_VERSION"
            exit 1
          fi
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm build
      - name: Publish to GitHub Packages (scoped package name required)
        # --registry is explicit here, not left to setup-node's scope+
        # registry-url .npmrc mapping alone — that combination did not
        # route npm publish to npm.pkg.github.com in practice (it fell
        # back to the default registry.npmjs.org and failed with
        # ENEEDAUTH), so the target registry is forced on the command
        # itself as the reliable fix.
        run: |
          npm pkg set name="@${{ github.repository_owner }}/use-browser-llm"
          npm publish --no-git-checks --registry=https://npm.pkg.github.com
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

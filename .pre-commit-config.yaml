# Pre-commit hooks for projects using claude-orchestration-kit.
#
# One-time setup per developer machine:
#   uv tool install pre-commit  # or: pip install pre-commit
#   pre-commit install
#
# The kit's setup-integrations.sh wizard offers to do this for you.
#
# After that, every `git commit` runs the hooks below before the commit
# is created. Push the failing fix as a normal commit; do NOT bypass
# with --no-verify — fix the issue and re-commit.
#
# The same hooks run in CI via .github/workflows/ci.yml on every PR.
# See docs/methodology/04-code-quality-and-gates.md for the full discipline.
#
# This config is the generic baseline. Add language-/tool-specific hooks
# (ruff for Python, hadolint for Dockerfiles, etc.) as your stack solidifies.

repos:
  # ── Standard hygiene ────────────────────────────────────────────────────
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
        # Preserve intentional double-space Markdown line breaks everywhere
        # (.editorconfig declares them significant for *.md).
        args: [--markdown-linebreak-ext=md]
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
      - id: check-merge-conflict
      - id: check-added-large-files
        args: [--maxkb=2048]
      - id: mixed-line-ending
        args: [--fix=lf]

  # ── Markdown / YAML / JSON formatting ────────────────────────────────────
  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v3.1.0
    hooks:
      - id: prettier
        types_or: [markdown, yaml, json]
        # Workflow YAMLs use GitHub-Actions-flavored syntax (actionlint governs
        # those). .claude/ data files and the TIME-LOG/AGENT-LOG audit trails
        # are written verbatim by tools/*.py — reformatting them just fights
        # the generator on every commit.
        exclude: ^(\.github/workflows/|\.claude/|TIME-LOG\.md$|AGENT-LOG\.md$)

  # ── GitHub Actions YAML lint ─────────────────────────────────────────────
  - repo: https://github.com/rhysd/actionlint
    rev: v1.7.7
    hooks:
      - id: actionlint

  # ── Secrets detection (uncomment to enable) ─────────────────────────────
  # Catches accidental commits of API keys, tokens, connection strings.
  # Setup: uv tool install detect-secrets && detect-secrets scan > .secrets.baseline
  # then commit the baseline. After that, only NEW secrets fail the hook.
  #
  # - repo: https://github.com/Yelp/detect-secrets
  #   rev: v1.5.0
  #   hooks:
  #     - id: detect-secrets
  #       args: [--baseline, .secrets.baseline]
  #       exclude: ^\.secrets\.baseline$
